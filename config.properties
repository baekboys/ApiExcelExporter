################### API 추출 관련 (ApiExcelExporter v11.3) ###################
# 1. 레파지토리명 : bitbucket명이 아닌 추출프로그램에서 파일명으로 쓰기 위함
REPO_NAME=TEST

# 2. 도메인주소 : 반드시 필수항목은 아니며, 추후 API테스트 시 편하게 하기 위함.
DOMAIN=https://www.naver.com

# 3. ★ 필수값 ★ : API추출을 위한 소스코드 위치, 윈도우환경이므로 \ 가 들어가야함
ROOT_PATH=/Users/baegmyeongseon/Downloads/spring-petclinic

# 4. API 목록 추출결과 위치 : Whatap 추출 결과 파일 위치도 동일함.
OUTPUT_DIR=/Users/baegmyeongseon/Downloads/API_RESULT

# 5. Git.exe 위치 : 일부 인원들이 자동수행이 안되어서 정확한 위치 추가
# 예: C:\\Program Files\\Git\\bin\\git.exe
GIT_BIN_PATH=git

# 6. [v12.0 신규] 관리 팀 명칭 : 미기입 시 공백 처리됨
TEAM_NAME=IT카드개발팀

# 7. [v12.0 신규] 관리 담당자 명칭 : 미기입 시 공백 처리됨
MANAGER_NAME=백명선

# 8. 모든 추출된 API 경로 앞에 일괄 추가할 프리픽스 (없으면 빈칸)
API_PATH_PREFIX=/APP

# 9. API 추출 시 치환할 상수 목록 (상수명=실제경로)
PATH_CONSTANTS=Constants.MEMBER_VERSION=/v1, ApiConst.BASE_URL=/api/v2

################### 미사용 의심 판별 기준 (v11.3) ###################
# 1. 미사용 의심 최대 호출 건수 : 이 횟수 이하(<=)로 호출되면 별점이 부여됩니다.
# 예: 2 (2회 이하 호출 시 의심 대상으로 분류)
NOT_USE_LIMIT_COUNT=2

# 2. 미사용 판단 커밋 기준일 : 이 날짜 이전(<)에 마지막 커밋이 발생했으면 별점이 추가됩니다.
# 형식: YYYY-MM-DD (예: 2024-01-01)
LAST_COMMIT_DATE=2025-11-26

################### 와탭 추출 관련 (WhatapApiCounter v5.5) ###################
# 1. 와탭 추출 활성화 여부 (Y/N)
WHATAP_ENABLED=N

# 2. 와탭 주소
WHATAP_URL=

# 3. [v5.5 신규] 와탭 프로젝트 코드 (기본값: 8)
# 프로젝트마다 다른 pcode 값을 여기에 설정하세요.
WHATAP_PCODE=8

# 4. [신규] 추출 기간 설정 (반드시 YYYYMMDD 형식을 지켜주세요)
# 예: 2025년 1월 1일부터 2025년 12월 31일까지
START_DATE=2025-02-01
END_DATE=2026-02-20

# 5. 서비스 필터 (비워두면 전체 검색이며 여러개이면 쉼표로 구분)
WHATAP_FILTER=

# 6. 에이전트 그룹 ID (쉼표로 구분, 비워두면 전체 검색, 에이전트 그룹ID는 와탭 로그인 후 개발자모드로 요청바디에 OKINDS값으로 확인가능)
# 로카 홈페이지
# 로카 앱
WHATAP_OKINDS=

# 7. 에이전트 그룹 명 (엑셀 추출 결과 파일명을 설정하기 위함)
WHATAP_OKINDS_NAME=

# 8. 와탭 세션 쿠키 (가장 중요!!!! 최초에 브라우저에서 와탭 로그인 후 개발자모드로 쿠키값 확인 필요!!!)
WHATAP_COOKIE=

